<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Đăng nhập - Quản lý Vận tải</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#b38d5b",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#dbd9dd",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-background": "#1b1b1e",
                        "primary-fixed-dim": "#b6c6f1",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "surface-container": "#efedf1",
                        "primary": "#041638",
                        "on-primary-fixed": "#081a3d",
                        "error-container": "#ffdad6",
                        "secondary": "#505f76",
                        "on-primary-fixed-variant": "#37466b",
                        "surface-container-low": "#f5f3f6",
                        "tertiary-fixed": "#ffddb5",
                        "secondary-fixed": "#d3e4fe",
                        "secondary-container": "#d0e1fb",
                        "tertiary-container": "#402700",
                        "on-tertiary-fixed-variant": "#5e4116",
                        "outline": "#75777f",
                        "inverse-surface": "#303033",
                        "secondary-fixed-dim": "#b7c8e1",
                        "error": "#ba1a1a",
                        "outline-variant": "#c5c6cf",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-primary-container": "#8393bc",
                        "on-primary": "#ffffff",
                        "background": "#fbf8fc",
                        "surface-bright": "#fbf8fc",
                        "surface-variant": "#e4e2e5",
                        "on-surface": "#1b1b1e",
                        "on-secondary-fixed": "#0b1c30",
                        "tertiary-fixed-dim": "#eabf89",
                        "surface-container-high": "#e9e7eb",
                        "inverse-primary": "#b6c6f1",
                        "tertiary": "#251400",
                        "surface-container-highest": "#e4e2e5",
                        "surface-tint": "#4e5e84",
                        "primary-fixed": "#d9e2ff",
                        "on-surface-variant": "#45464e",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f2f0f3",
                        "primary-container": "#1b2b4e",
                        "surface": "#fbf8fc",
                        "on-tertiary-fixed": "#2a1800"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sidebar_width": "280px",
                        "margin_page": "32px",
                        "stack_md": "16px",
                        "gutter": "24px",
                        "stack_lg": "24px",
                        "stack_sm": "8px",
                        "container_max_width": "1440px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "title-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "status-badge": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-sm": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "status-badge": ["12px", { "lineHeight": "12px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-margin_page text-on-surface antialiased">
<!-- Login Card Container -->
<div class="bg-surface w-full max-w-[440px] rounded-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1),0_4px_6px_-2px_rgba(0,0,0,0.05)] border border-outline-variant/30 overflow-hidden">
<!-- Top Accent Line -->
<div class="h-1 w-full bg-primary"></div>
<div class="p-stack_lg sm:p-10 flex flex-col gap-stack_lg">
<!-- Header -->
<div class="text-center mb-2">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container/10 text-primary mb-4">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-2">Quản trị CarPro</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Đăng nhập để quản lý hoạt động đội xe của bạn</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-stack_md" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="email">Địa chỉ Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline/70 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="email" name="email" placeholder="quanly@fleetpro.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder:text-outline/70 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-1 mb-2">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Ghi nhớ đăng nhập
                        </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors font-medium" href="#">
                            Quên mật khẩu?
                        </a>
</div>
</div>
<!-- Action Buttons -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-body-md text-body-md font-semibold text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Đăng nhập
                </button>
</form>
<!-- Registration Link -->
<div class="mt-2 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="font-body-sm text-body-sm font-semibold text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors" href="#">Đăng ký</a>
</p>
</div>
</div>
<!-- Footer / Back to Home -->
<div class="bg-surface-container-low px-stack_lg py-4 border-t border-outline-variant/30 text-center">
<a class="inline-flex items-center gap-1 font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Quay về Trang chủ
            </a>
</div>
</div>


</body></html>
